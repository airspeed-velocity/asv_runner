# Uncomment this if your project is hosted on GitHub:
github_url = "https://github.com/airspeed-velocity/asv_runner/"

[version]
current = "0.2.2"

# Example of a semver regexp.
# Make sure this matches current_version before
# using tbump
regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  '''

[git]
message_template = "REL: Bump version to v{new_version}"
tag_template = "v{new_version}"

[[file]]
src = "docs/source/conf.py"

# Prefer prek (faster, same config via prek.toml / .pre-commit-config.yaml)
[[before_commit]]
name = "prek"
cmd = "prek run -a || uvx prek run -a || pipx run pre-commit run -a"

[[before_commit]]
name = "generate-release-notes"
cmd = 'towncrier build --version {new_version} --date "$(date -u +%d-%m-%Y)"'

[[before_commit]]
name = "unit-tests"
cmd = "PDM_BUILD_SCM_VERSION={new_version} python -m unittest discover -s tests -q"

# After tag push, wheels are built and uploaded by .github/workflows/build_wheels.yml
# (trusted publishing on tags v*). No extra after_push required.
