# Invoked by /trigger-asv slash command (slashdot_trigger.yml → repository_dispatch).
# Runs full asv suite on asv's main against this PR's asv_runner head (see asv triggered.yml).
# Prefer PR "test_asv" matrix (pr + pypi) for fast dual coverage; this is the heavy upstream guard.
name: Trigger asv

on:
  repository_dispatch:
    types: [trigger-asv-command]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  triggerasv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dispatch asv triggered.yml on main
        uses: convictional/trigger-workflow-and-wait@v1.6.5
        with:
          owner: airspeed-velocity
          repo: asv
          github_token: ${{ secrets.ASV_TOK }}
          workflow_file_name: triggered.yml
          # asv default branch is main (was wrongly "master")
          ref: main
          wait_workflow: true
          client_payload: >-
            {"pr_number": "${{ github.event.client_payload.slash_command.args.named.pr_number }}"}
