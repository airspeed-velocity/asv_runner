# Protects against (1) regressions in this PR's asv_runner and (2) broken asv×PyPI runner combos.
name: test_asv

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PDM_BUILD_SCM_VERSION: "0.2.2.dev0"

jobs:
  test_asv:
    name: asv × ${{ matrix.runner_source }} runner (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        # pr = this PR's asv_runner via ASV_RUNNER_PATH
        # pypi = asv's declared dependency only (upstream protection)
        runner_source: [pr, pypi]
    steps:
      - name: Checkout asv_runner (PR head)
        uses: actions/checkout@v4
        with:
          path: asv_runner
          fetch-depth: 0

      - name: Checkout asv (upstream main)
        uses: actions/checkout@v4
        with:
          repository: airspeed-velocity/asv
          path: asv
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install asv[test] (pulls PyPI asv_runner by default)
        run: |
          python -m pip install -U pip
          python -m pip install -e "./asv[test]"

      - name: Install PR asv_runner over PyPI (pr matrix only)
        if: matrix.runner_source == 'pr'
        run: python -m pip install -e ./asv_runner

      - name: Show versions
        run: |
          python -c "import asv, asv_runner, pathlib; print('asv', asv.__file__); print('runner', asv_runner.__file__); print('runner_source', '${{ matrix.runner_source }}')"

      - name: Run focused asv tests (PR runner in envs)
        if: matrix.runner_source == 'pr'
        env:
          # Relative path: asv ParsedPipDeclaration truncates multi-segment absolutes (asv-8650).
          ASV_RUNNER_PATH: ../asv_runner
        run: |
          cd asv
          test -d ../asv_runner/asv_runner
          python -m pytest -q --timeout=300 \
            test/test_benchmarks.py \
            test/test_runner.py \
            test/test_console.py \
            test/test_statistics.py

      - name: Run focused asv tests (PyPI runner only — upstream guard)
        if: matrix.runner_source == 'pypi'
        run: |
          cd asv
          # Do not set ASV_RUNNER_PATH; envs install asv's pinned asv_runner from PyPI.
          python -m pytest -q --timeout=300 \
            test/test_benchmarks.py \
            test/test_runner.py \
            test/test_console.py \
            test/test_statistics.py
