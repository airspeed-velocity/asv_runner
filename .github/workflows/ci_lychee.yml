name: Links (lychee)

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link check (repo markdown)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            --no-progress
            README.md
            CHANGELOG.md
            CODE_OF_CONDUCT.md
            docs/source
          fail: false
